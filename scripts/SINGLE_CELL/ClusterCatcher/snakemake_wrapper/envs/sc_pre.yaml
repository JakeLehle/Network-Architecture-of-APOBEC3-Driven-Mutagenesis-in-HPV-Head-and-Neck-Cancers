channels:
  - conda-forge
  - bioconda
  - plotly
dependencies:
  # Core Python
  - python=3.11
  - cython
  - numpy=1.26.4
  - pandas=2.2.3
  - scipy
  - scikit-learn
  - setuptools<78 
 
  # Scanpy ecosystem
  - scanpy=1.10.4
  - anndata=0.12.6
  - leidenalg
  - louvain
  - python-igraph
  - bbknn
  - umap-learn
  - pynndescent
  - fa2
  
  # Cell annotation
  - celltypist
  - cellxgene-census
  - scvi-tools=1.4.0.post1
  
  # CNV analysis
  - gffutils
  
  # Visualization
  - matplotlib-base
  - seaborn
  - plotly-orca
  - hvplot
  - adjusttext
  
  # Data handling
  - pybiomart
  - goatools
  - geoparse
  
  # SRA tools (for SRAscraper compatibility)
  - awscli
  - parallel-fastq-dump
  - pysradb
  - python-wget
  - sra-tools>=3.0.0
  
  # Utilities
  - pyyaml
  - jupyter_core
  - jupyterlab
  
  # MultiQC for reports
  - multiqc
  
  # GSEA
  - bioconda::gseapy
  
  # GUI tools (optional, can be removed for headless)
  - pyqt
  - qt
  - firefox
  - pygraphviz
  
  # pip dependencies
  - pip
  - pip:
    - scrublet           # For doublet detection
    - popv>=0.6.1               # For cell annotation consensus
    - cytotrace2-py>=1.1.0.4      # For stemness scoring (install from github if needed)
    - infercnvpy         # For CNV analysis  
